<html lang="en" data-theme="dark">

  <link rel="icon" href="logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- ✅ Jodit Editor -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jodit@3.24.5/build/jodit.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/jodit@3.24.5/build/jodit.min.js"></script>

  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --text-light: #e2e8f0;
      --text-dark: #0f172a;
      --primary: #2563eb;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-light);
      display: flex;
      height: 100vh;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background-color: var(--bg-card);
      display: flex;
      flex-direction: column;
      padding: 20px;
      justify-content: space-between;
      transition: 0.3s;
    }

    .sidebar h2 {
      font-size: 22px;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar h2 img { height: 35px; }

    .sidebar a {
      text-decoration: none;
      padding: 12px 16px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      transition: 0.3s;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background-color: var(--primary);
      color: white;
    }

    /* Dark mode toggle */
    .theme-toggle {
      margin-top: 10px;
      background: none;
      border: 1px solid #64748b;
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      transition: background 0.3s;
    }

    .theme-toggle:hover {
      background: rgba(255,255,255,0.1);
    }

    /* Main content */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      background-color: var(--bg-dark);
      transition: background 0.3s, color 0.3s;
    }

    .card {
      background-color: var(--bg-card);
      padding: 30px;
      border-radius: 15px;
      max-width: 850px;
      margin: 0 auto;
      transition: background 0.3s;
    }

    .card h2 { font-size: 22px; margin-bottom: 10px; }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      background-color: #0f172a;
      color: white;
      font-size: 15px;
      margin-bottom: 20px;
    }

    /* ✅ Jodit Editor Styling */
    #description {
      border-radius: 10px;
      overflow: hidden;
    }

    .jodit-container {
      border-radius: 10px;
      overflow: hidden;
      border: none !important;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }

    .jodit-toolbar__box {
      border-bottom: 1px solid #ccc !important;
      position: sticky !important;
      top: 0;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      align-items: center;
      gap: 4px;
      padding: 8px 10px !important;
    }

    .jodit-toolbar-button {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      margin: 1px !important;
    }

    .jodit-toolbar-button__button {
      border-radius: 6px !important;
      padding: 5px !important;
      min-width: 28px !important;
      height: 28px !important;
    }

    .jodit-wysiwyg {
      min-height: 350px;
      font-size: 15px;
      padding: 12px;
      border-radius: 10px;
    }

    /* ✅ Thumbnail preview styling */
    .preview-container {
      margin-top: 20px;
      border: 1px dashed #64748b;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
      background-color: rgba(255,255,255,0.05);
      display: flex;
      align-items: flex-start;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .preview {
      margin-top: 10px;
      max-width: 48%;
      max-height: 200px;
      border-radius: 10px;
      display: block;
      object-fit: contain;
    }

    #thumbnail, #videoUpload {
      background: none;
      border: 1px solid #475569;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      width: 100%;
    }

    [data-theme="light"] .preview-container {
      background-color: #f8fafc;
      border-color: #94a3b8;
    }

    /* =========================== */
    [data-theme="dark"] body {
      background-color: #0f172a;
      color: #e2e8f0;
    }

    [data-theme="light"] body {
      background-color: #f1f5f9;
      color: #0f172a;
    }

    [data-theme="dark"] .sidebar { background-color: #1e293b; color: #e2e8f0; }
    [data-theme="light"] .sidebar { background-color: #e2e8f0; color: #0f172a; }

    [data-theme="dark"] .sidebar a { color: #cbd5e1; }
    [data-theme="light"] .sidebar a { color: #1e293b; }

    [data-theme="light"] .sidebar a:hover,
    [data-theme="light"] .sidebar a.active {
      background-color: #2563eb;
      color: white;
    }

    [data-theme="dark"] .card { background-color: #1e293b; color: #e2e8f0; }
    [data-theme="light"] .card { background-color: #ffffff; color: #0f172a; }

    [data-theme="dark"] label { color: #cbd5e1; }
    [data-theme="light"] label { color: #0f172a; }

    [data-theme="dark"] input,
    [data-theme="dark"] select { background-color: #0f172a; color: #e2e8f0; }
    [data-theme="light"] input,
    [data-theme="light"] select { background-color: #f8fafc; color: #0f172a; }

    [data-theme="dark"] .theme-toggle { color: #cbd5e1; border-color: #64748b; }
    [data-theme="light"] .theme-toggle { color: #0f172a; border-color: #94a3b8; }

    [data-theme="dark"] .jodit-toolbar__box { background: #1e293b !important; }
    [data-theme="light"] .jodit-toolbar__box { background: #f8f9fa !important; }

    [data-theme="dark"] .jodit-wysiwyg { background: #0f172a !important; color: #e2e8f0 !important; }
    [data-theme="light"] .jodit-wysiwyg { background: white !important; color: black !important; }

    [data-theme="dark"] .jodit-toolbar-button__icon svg,
    [data-theme="dark"] .jodit-toolbar-button__icon,
    [data-theme="dark"] .jodit-toolbar-button__icon i {
      fill: #ffffff !important;
      color: #ffffff !important;
    }

    [data-theme="light"] .jodit-toolbar-button__icon svg,
    [data-theme="light"] .jodit-toolbar-button__icon,
    [data-theme="light"] .jodit-toolbar-button__icon i {
      fill: #000000 !important;
      color: #000000 !important;
    }

    button.create-btn,
    button.publish-btn,
    button.remove-btn {
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    button.create-btn {
      background-color: var(--primary);
      color: white;
    }

    button.publish-btn {
      background-color: #16a34a;
      color: white;
      margin-right: 10px;
    }

    button.remove-btn {
      background-color: #dc2626;
      color: white;
    }

    .button-group {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }

    .hidden { display: none; }
    /* ================= MOBILE RESPONSIVE ================= */
@media (max-width: 1024px) {
  .content {
    padding: 25px;
  }

  .card {
    padding: 22px;
  }
}

@media (max-width: 768px) {
  body {
    flex-direction: column;
    height: auto;
  }

  /* Sidebar becomes top bar */
  .sidebar {
    width: 100%;
    height: auto;
    flex-direction: row;
    align-items: center;
    padding: 12px 16px;
    gap: 12px;
    overflow-x: auto;
  }

  .sidebar h2 {
    margin-bottom: 0;
    font-size: 18px;
    white-space: nowrap;
  }

  .sidebar a {
    margin-bottom: 0;
    padding: 8px 12px;
    font-size: 14px;
    white-space: nowrap;
  }

  .main {
    height: auto;
  }

  .content {
    padding: 20px;
  }

  .card {
    max-width: 100%;
    padding: 20px;
    border-radius: 12px;
  }

  /* Image + Video stack vertically */
  .content > .card div[style*="display: flex"] {
    flex-direction: column;
    gap: 25px !important;
  }

  .preview {
    max-width: 100%;
    max-height: 220px;
  }

  .button-group {
    flex-direction: column;
  }

  .button-group button {
    width: 100%;
  }
}

@media (max-width: 480px) {
  .sidebar h2 img {
    height: 28px;
  }

  .sidebar h2 {
    font-size: 16px;
  }

  label {
    font-size: 14px;
  }

  input,
  select {
    font-size: 14px;
    padding: 10px;
  }

  .jodit-wysiwyg {
    min-height: 280px;
    font-size: 14px;
  }

  .card h2 {
    font-size: 18px;
  }

  .card p {
    font-size: 14px;
  }
}

  
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div>
      <h2><img src="logo.png" alt="">Cosmo Blog
      
      </h2>
      <a href="all-posts.html"><i class="fa-solid fa-house"></i> Home</a>
      <a href="yourblogs.html"><i class="fa-solid fa-book"></i> My Blogs</a>
      <a href="create-blog.html" class="active"><i class="fa-solid fa-pen"></i> Create Blog</a>
      <a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>
      <a href="about-us.html"><i class="fa-solid fa-circle-info"></i> About</a>
      
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="content">
      <div class="card" id="step1">
        <h2>Let's create blog</h2>
        <p>Fill out the basic details below to start your blog.</p>

        <label for="blogTitle">Title</label>
        <input type="text" id="blogTitle" placeholder="Your Blog Name" />


        <label for="mainCategory">Main Category</label>
        <select id="mainCategory">
          <option value="">Select a main category</option>
        </select>

        <label for="subCategory">Subcategory</label>
        <select id="subCategory" disabled>
          <option value="">Select a subcategory</option>
        </select>




        <button class="create-btn" id="createBtn">Create</button>
      </div>

      <div class="card hidden" id="step2">
        <h2>Basic Blog Information</h2>
        <p>Make changes to your blog here. Click publish when you're done.</p>

        <label for="titleInput">Title</label>
        <input type="text" id="titleInput" placeholder="Enter your blog title" />


        <label for="description">Description</label>
        <textarea id="description" placeholder="Start writing..."></textarea>

        <!-- ✅ Image + Video Upload Side by Side -->
        <div style="display: flex; gap: 40px; align-items: flex-start; flex-wrap: wrap; justify-content: space-between;">
          <!-- Image Upload -->
          <div style="flex: 1; min-width: 300px;">
            <label for="imageUploade">Image</label>
            <input type="file" id="imageUpload" accept="image/*" />
            <div class="preview-container hidden" id="previewContainer">
              <p>Preview:</p>
              <img id="imagePreview" class="preview hidden" alt="Image Preview" />
            </div>

            <!-- ✅ Image URL Input -->
            <label for="imageURL">Image URL</label>
            <input type="url" id="imageURL" placeholder="Enter image URL" />
          </div>

           <!-- Video Upload -->
           <div style="flex: 1; min-width: 300px;">
            <label for="videoUpload">Video</label>
            <input type="file" id="videoUpload" accept="video/*" />
            <div class="preview-container hidden" id="videoPreviewContainer">
              <p>Preview:</p>
              <video id="videoPreviewBox" class="preview hidden" controls></video>
            </div>

            <!-- ✅ Video URL Input -->
            <label for="videoURL">Video URL</label>
            <input type="url" id="videoURL" placeholder="Enter video URL (e.g. YouTube, Vimeo...)" />
          </div>
        </div>


        <div class="button-group">
          <button class="publish-btn" id="publishBtn"><i class="fa-solid fa-upload"></i> Publish</button>
          <button class="remove-btn" id="removeBtn"><i class="fa-solid fa-trash"></i> Remove Blog</button>
          <button class="create-btn" id="generateAI">Generate with AI</button>
        </div>
      </div>
    </div>
  </div>

    if (!selectedMain) {
      subSelect.disabled = true;
      return;
    }

    const subs = categories.filter(cat => cat.parent === selectedMain);
    subs.forEach(sub => {
      const option = document.createElement("option");

      option.textContent = sub.name;
      subSelect.appendChild(option);

        title: document.getElementById("blogTitle").value,
        mainCategory: document.getElementById("mainCategory").value,
        subCategory: document.getElementById("subCategory").value,
        content: editor.value

    document.getElementById("blogTitle").value = savedDraft.title || "";
    document.getElementById("mainCategory").value = savedDraft.mainCategory || "";

    // Populate subcategories based on saved main category

}

  // ✅ Publish & Remove Logic
  const publishBtn = document.getElementById("publishBtn");
  const removeBtn = document.getElementById("removeBtn");

if (publishBtn) {
    publishBtn.addEventListener("click", async () => {
        // NOTE: subtitleInput doesn't exist in HTML, using categoryInput for logic
        const titleInput = document.getElementById("titleInput");
        const categoryInput = document.getElementById("mainCategory"); // Using main category for context

        const title = titleInput?.value.trim() || "";
        // const subtitle = subtitleInput?.value.trim() || ""; // Variable removed as input doesn't exist
        const category = categoryInput?.value.trim() || "General";
        const content = editor.value.trim();
        
        // Get Media Inputs
        const imageFile = document.getElementById("imageUpload")?.files[0];
        const videoFile = document.getElementById("videoUpload")?.files[0];
        const imageURL = document.getElementById("imageURL")?.value.trim() || "";
        const videoURL = document.getElementById("videoURL")?.value.trim() || "";
        const token = localStorage.getItem("token");

        if (!token) {
            alert("⚠️ You must be logged in to publish a blog.");
            console.warn("Publish blocked: No token found in localStorage");
            return;
        }

        if (!title || !content) {
            alert("⚠️ Please enter a title and description before publishing.");
            return;
        }

        try {
            const formData = new FormData();
            formData.append("title", title);
            // formData.append("subtitle", subtitle); // Removed
            formData.append("description", content);
            formData.append("category", category);
            formData.append("status", "published");

            // ✅ CORRECTED LOGIC FOR IMAGE: Prioritize URL over File
            if (imageURL) {
                formData.append("imageURL", imageURL);
            } else if (imageFile) {
                formData.append("image", imageFile);
            }

            // ✅ CORRECTED LOGIC FOR VIDEO: Prioritize URL over File
            if (videoURL) {
                formData.append("videoURL", videoURL);
            } else if (videoFile) {
                formData.append("video", videoFile);
            }

            console.log("Publishing blog with data:", { title, content, category, imageFile, videoFile, imageURL, videoURL });
            console.log("FormData prepared, sending request...");

            const response = await fetch("http://localhost:5000/api/add-post", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${token}`,
                },
                body: formData,
            });

            const data = await response.json();
            console.log("Response received:", response);
            console.log("Response JSON:", data);

            if (response.ok) {
                alert("✅ Blog published successfully!");
                window.location.href = "all-posts.html";
            } else {
                alert("⚠️ Failed to publish: " + (data.message || data.error || "Unknown error"));
            }
        } catch (error) {
            console.error("❌ Error publishing blog:", error);
            alert("❌ Error connecting to the server. Check console for details.");
        }
    });
}

  const themeToggle = document.getElementById("themeToggle");
  const root = document.documentElement;

  function setTheme(theme) {
    root.setAttribute("data-theme", theme);
    localStorage.setItem("theme", theme);
  }

  if (themeToggle) {
    themeToggle.addEventListener("click", () => {
      const current = root.getAttribute("data-theme");
      const newTheme = current === "dark" ? "light" : "dark";
      setTheme(newTheme);

      themeToggle.innerHTML =
        newTheme === "dark"
          ? '<i class="fa-solid fa-sun"></i> Light Mode'
          : '<i class="fa-solid fa-moon"></i> Dark Mode';
    });

    const savedTheme = localStorage.getItem("theme") || "dark";
    setTheme(savedTheme);

    themeToggle.innerHTML =
      savedTheme === "dark"
        ? '<i class="fa-solid fa-sun"></i> Light Mode'
        : '<i class="fa-solid fa-moon"></i> Dark Mode';
  }
});
