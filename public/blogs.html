<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cosmo Blog – Blogs</title>
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg-dark: #0f172a;
      --card-dark: #1e293b;
      --text-light: #ffffff;
      --text-dark: #000000;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --hover: #334155;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
      transition: background 0.25s, color 0.25s;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Light Mode */
    body.light-mode {
      background-color: #ffffff;
      color: var(--text-dark);
    }

    body.light-mode header,
    body.light-mode footer,
    body.light-mode .post-card {
      background-color: #f1f5f9;
      color: var(--text-dark);
    }

    body.light-mode .dropdown-menu {
      background-color: #f1f5f9;
    }

    body.light-mode nav a,
    body.light-mode .blogs-btn {
      color: var(--text-dark);
    }

    body.light-mode .search-bar input {
      background: #e2e8f0;
      color: var(--text-dark);
    }

    body.light-mode .meta {
      color: #475569;
    }

    body.light-mode .post-title {
      color: var(--accent);
    }

    /* Dark/Light text toggle for all elements */
    body.light-mode * {
      color: var(--text-dark) !important;
    }

    body:not(.light-mode) * {
      color: var(--text-light) !important;
    }

    header {
      background: var(--card-dark);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      position: sticky;
      top: 0;
      z-index: 10;
      flex-wrap: wrap;
      gap: 1rem;
      width: 100%;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .header-left img {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      object-fit: cover;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .search-bar {
      position: relative;
      margin-left: 1rem;
    }

    .search-bar input {
      padding: 0.5rem 2.5rem 0.5rem 1rem;
      border-radius: 2rem;
      border: none;
      outline: none;
      background: var(--hover);
      color: var(--text-light);
      font-size: 0.9rem;
    }

    .search-bar i {
      position: absolute;
      right: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
    }

    nav {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    nav a,
    .blogs-btn {
      color: var(--text-light);
      text-decoration: none;
      font-weight: 500;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }

    nav a:hover,
    .blogs-btn:hover {
      color: var(--accent);
    }

    .profile-container {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .profile-pic {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid var(--accent);
    }

    .dropdown-menu {
      position: absolute;
      top: 60px;
      right: 0;
      background: var(--card-dark);
      border-radius: 10px;
      width: 180px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 20;
    }

    .dropdown-menu.active {
      display: flex;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .dropdown-menu a {
      padding: 0.8rem 1rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.9rem;
      color: var(--text-light);
    }

    .dropdown-menu a:hover {
      background: var(--hover);
    }

    .logout-btn {
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .dark-mode-toggle {
      background: none;
      border: none;
      text-align: left;
      padding: 0.8rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.9rem;
      color: var(--text-light);
      cursor: pointer;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .dark-mode-toggle:hover {
      background: var(--hover);
    }

    .page-heading {
      text-align: center;
      font-size: 3rem;
      margin-top: 2.5rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      width: 100%;
      color: var(--accent);
    }

    .container {
      flex: 1;
      width: 100%;
      padding: 2rem 3rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    .post-card {
      background: var(--card-dark);
      border-radius: 1rem;
      padding: 1.5rem;
      transition: all 0.25s ease;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      position: relative;
    }

    .post-card:hover {
      transform: translateY(-6px);
      background: var(--hover);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.15);
    }

    .post-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    h3.post-title {
      color: var(--accent);
      font-size: 1.15rem;
      margin: 0 0 6px 0;
    }

    .post-footer {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      margin-top: 8px;
      position: relative;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .meta i {
      margin-right: 4px;
      color: var(--accent);
    }

    .read-more-btn {
      align-self: flex-end;
      margin-top: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .read-more-btn:hover {
      background: #2563eb;
    }

    .loader {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 1.1rem;
      color: var(--accent);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    footer {
      text-align: center;
      padding: 1rem 0;
      font-size: 0.85rem;
      color: var(--text-muted);
      background: var(--card-dark);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      width: 100%;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <img src="logo.png" alt="Cosmo Blog Logo">
      <h1>Cosmo Blog</h1>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search posts..." />
        <i class="fa-solid fa-magnifying-glass"></i>
      </div>
    </div>

    <nav>
      <a href="all-posts.html" id="homeBtn">Home</a>
      <button class="blogs-btn" id="blogsBtn">Blogs</button>
      <a href="profile.html">Profile</a> 
      <a href="about-us.html">About</a>
      <div class="profile-container">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="User" class="profile-pic" id="profilePic">
        <div class="dropdown-menu" id="dropdownMenu">
          <a href="#" id="profileLink"><i class="fa-regular fa-user"></i> Profile</a>
          <button class="dark-mode-toggle" id="darkModeToggle"><i class="fa-solid fa-moon"></i> Dark Mode</button>
          
        </div>
      </div>
    </nav>
  </header>

  <h2 class="page-heading" id="pageHeading">BLOGS</h2>

  <div id="loader" class="loader">🚀 Loading posts...</div>
  <div id="post-container" class="container"></div>

  <footer>
    <p>© 2025 Cosmo Blog. All rights reserved.</p>
  </footer>

  <script>
    const container = document.getElementById("post-container");
    const loader = document.getElementById("loader");
    const pageHeading = document.getElementById("pageHeading");
    const homeBtn = document.getElementById("homeBtn");
    const blogsBtn = document.getElementById("blogsBtn");
    const profilePic = document.getElementById("profilePic");
    const dropdownMenu = document.getElementById("dropdownMenu");
    const searchInput = document.getElementById("searchInput");
    const profileLink = document.getElementById("profileLink");
    const darkModeToggle = document.getElementById("darkModeToggle");
    const baseURL = "http://localhost:5000";
    const fallbackImage = `${baseURL}/uploads/no-image.png`;

    // Detect system theme preference
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
      document.body.classList.add('light-mode');
    }

    // Dark mode toggle
    darkModeToggle.addEventListener("click", () => {
      document.body.classList.toggle("light-mode");
      darkModeToggle.innerHTML = document.body.classList.contains("light-mode")
        ? '<i class="fa-solid fa-sun"></i> Light Mode'
        : '<i class="fa-solid fa-moon"></i> Dark Mode';
    });

    let cachedPosts = null;
    let isFetching = false;

    profilePic.addEventListener("click", (e) => {
      dropdownMenu.classList.toggle("active");
      e.stopPropagation();
    });
    window.addEventListener("click", (e) => {
      if (!profilePic.contains(e.target) && !dropdownMenu.contains(e.target))
        dropdownMenu.classList.remove("active");
    });

    profileLink.addEventListener("click", (e) => {
      e.preventDefault();
      window.location.href = "profile.html";
    });

    searchInput.addEventListener("input", (e) => {
      const q = e.target.value.trim().toLowerCase();
      if (!cachedPosts) return;
      const filtered = cachedPosts.filter(p =>
        (p.title || "").toLowerCase().includes(q) ||
        (p.content || "").toLowerCase().includes(q) ||
        (p.username || "").toLowerCase().includes(q)
      );
      renderPosts(filtered);
    });

    async function fetchPostsFromServer() {
      if (isFetching) return;
      isFetching = true;
      loader.style.display = "block";
      try {
        const res = await fetch("http://localhost:5000/api/posts", { cache: "no-store" });
        const posts = await res.json();
        cachedPosts = Array.isArray(posts) ? posts : [];
        isFetching = false;
        loader.style.display = "none";
        return cachedPosts;
      } catch (err) {
        console.error(err);
        isFetching = false;
        loader.textContent = "❌ Failed to load posts.";
        return [];
      }
    }

function renderPosts(posts) {
  if (!Array.isArray(posts) || posts.length === 0) {
    container.innerHTML = `<p style="text-align:center;">No posts available yet.</p>`;
    return;
  }

  container.innerHTML = posts.map(p => {
    const date = new Date(p.created_at || Date.now()).toLocaleDateString(undefined, {
      year: 'numeric',
      month: 'short',
      day: 'numeric'
    });

    // ✅ Smart image handling
    let imageURL = fallbackImage;
    if (p.image) {
      if (p.image.startsWith("http")) {
        imageURL = p.image;
      } else {
        imageURL = p.image.startsWith("/uploads/")
          ? `${baseURL}${p.image}`
          : `${baseURL}/uploads/${p.image}`;
      }
    }

    // ✅ Smart video handling
    let videoHtml = "";
    if (p.video) {
      if (p.video.includes("youtube.com") || p.video.includes("youtu.be")) {
        // YouTube embed
        let videoId = "";
        if (p.video.includes("youtu.be/")) {
          videoId = p.video.split("youtu.be/")[1];
        } else if (p.video.includes("v=")) {
          videoId = new URL(p.video).searchParams.get("v");
        }
        videoHtml = `
          <div class="video-wrapper" style="margin-top:10px;">
            <iframe width="100%" height="200" src="https://www.youtube.com/embed/${videoId}" 
              frameborder="0" allowfullscreen></iframe>
          </div>`;
      } else if (p.video.endsWith(".mp4")) {
        // Local uploaded video
        const videoSrc = p.video.startsWith("/uploads/")
          ? `${baseURL}${p.video}`
          : `${baseURL}/uploads/${p.video}`;
        videoHtml = `
          <video width="100%" height="200" controls style="border-radius:10px; margin-top:10px;">
            <source src="${videoSrc}" type="video/mp4">
            Your browser does not support the video tag.
          </video>`;
      }
    }

    // ✅ Image or Video priority (if both exist)
    const mediaHtml = videoHtml || `<img src="${imageURL}" alt="${p.title || 'Post Image'}" onerror="this.src='${fallbackImage}'" />`;

    return `
      <div class="post-card">
        ${mediaHtml}
        <h3 class="post-title">${p.title || "Untitled"}</h3>
        <div class="post-footer">
          <div class="meta">
            <small><i class="fa-solid fa-user"></i> ${p.username || "Anonymous"}</small>
            <span>|</span>
            <small><i class="fa-solid fa-calendar-days"></i> ${date}</small>
          </div>
          <button class="read-more-btn" data-id="${p.id}">Read More</button>
        </div>
      </div>`;
  }).join("");

  document.querySelectorAll(".read-more-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const user = localStorage.getItem("token") || sessionStorage.getItem("token");
      if (!user) {
        window.location.href = "login.html";
      } else {
        const postId = btn.getAttribute("data-id");
        window.location.href = `post.html?id=${postId}`;
      }
    });
  });
}



    async function loadAllPosts() {
      pageHeading.style.display = "block";
      if (cachedPosts) {
        loader.style.display = "none";
        renderPosts(cachedPosts);
        return;
      }
      const posts = await fetchPostsFromServer();
      renderPosts(posts);
    }

    homeBtn.addEventListener("click", (e) => {
      e.preventDefault();
      window.location.href = "all-posts.html";
    });

    blogsBtn.addEventListener("click", (e) => {
      e.preventDefault();
      window.location.href = "blogs.html";
      loadAllPosts();
    });

    window.addEventListener("load", () => {
      pageHeading.style.display = "block";
      loadAllPosts();
    });
  </script>
</body>
</html>
